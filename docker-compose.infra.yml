# Starts only infrastructure services (no API build required)
# Use during development: docker compose -f docker-compose.infra.yml up -d
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: barberflow-postgres
    environment:
      POSTGRES_DB: barberflow
      POSTGRES_USER: barberflow
      POSTGRES_PASSWORD: barberflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: barberflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: barberflow-kafka
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    container_name: barberflow-redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8090:8080"
    entrypoint: /bin/sh
    command: -c 'echo "kafka:\n  brokers:\n    - redpanda:9092" > /tmp/config.yml && /app/console'

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
