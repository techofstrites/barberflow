spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///barberflow
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092  # Testcontainers overrides in integration tests

  data:
    redis:
      url: redis://localhost:6379

logging:
  level:
    com.barberflow: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: test-secret-for-integration-tests-32chars
  expiration-ms: 3600000
