spring:
  application:
    name: barberflow

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/barberflow}
    username: ${DATABASE_USER:barberflow}
    password: ${DATABASE_PASSWORD:barberflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration/system
    schemas: public
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: barberflow
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.barberflow.*"

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:barberflow-secret-change-in-production-32chars!}
  expiration-ms: 900000       # 15 minutes
  refresh-expiration-ms: 604800000  # 7 days

whatsapp:
  api:
    base-url: ${WHATSAPP_API_BASE_URL:https://graph.facebook.com/v22.0}
    token: ${WHATSAPP_API_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  webhook:
    verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:barberflow_verify}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.barberflow: DEBUG
    org.springframework.security: INFO
    org.springframework.kafka: WARN
